<!DOCTYPE html>
<html>
<head>
<title>Basic Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly aria-label="Calculator display">

<div class="buttons">
<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">/</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">*</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">-</button>

<button onclick="append('0')">0</button>
<button onclick="clearDisplay()">C</button>
<button onclick="calculate()">=</button>
<button onclick="append('+')">+</button>

</div>
</div>

<div class="controls" style="width:92%; max-width:420px; margin-top:12px; display:flex; align-items:center; gap:8px;">
	<div style="flex:1;">
		<button id="historyToggle" onclick="toggleHistory()">History</button>
	</div>
	<div style="display:flex; gap:8px;">
		<button id="copyBtn" onclick="copyToClipboard()">Copy</button>
		<button id="pasteBtn" onclick="pasteFromClipboard()">Paste</button>
	</div>
</div>

<script src="script.js"></script>

<div id="historyPanel" style="display:none; width:92%; max-width:420px; margin-top:10px;">
	<div class="history-header" style="display:flex; justify-content:space-between; align-items:center; gap:8px; padding:8px 10px; background:rgba(11,116,255,0.04); border-radius:8px;">
		<strong>History</strong>
		<div style="display:flex; gap:8px;">
			<button onclick="clearHistory()">Clear</button>
			<button onclick="toggleHistory()">Close</button>
		</div>
	</div>
	<ul id="historyList" class="history-list" style="list-style:none; margin:8px 0 0 0; padding:0; max-height:220px; overflow:auto; border-radius:8px;"></ul>
</div>

</body>
</html>
